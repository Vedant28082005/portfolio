<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0F"/>
      <stop offset="100%" style="stop-color:#111118"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,212,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect x="80" y="120" width="4" height="390" fill="#00D4FF" opacity="0.8"/>

  <!-- Name -->
  <text x="116" y="220" font-family="monospace, sans-serif" font-weight="bold" font-size="86"
        fill="#F0F0FF" letter-spacing="-2">VEDANT</text>
  <text x="116" y="320" font-family="monospace, sans-serif" font-weight="bold" font-size="86"
        fill="#F0F0FF" letter-spacing="-2">SUTARIYA</text>

  <!-- Cyan underline -->
  <rect x="116" y="340" width="160" height="3" fill="#00D4FF"/>

  <!-- Tagline -->
  <text x="116" y="400" font-family="monospace, sans-serif" font-size="26"
        fill="#00D4FF">Hardware · AI · Robotics Engineer</text>

  <!-- Sub -->
  <text x="116" y="448" font-family="monospace, sans-serif" font-size="20"
        fill="#6B7280">B.Tech ICT @ PDEU · PhysAgent · FactoryMind AI</text>

  <!-- Domain -->
  <text x="116" y="510" font-family="monospace, sans-serif" font-size="18"
        fill="#1E1E2E">▸ vedantsutariya.com</text>

  <!-- Right: Terminal box -->
  <rect x="750" y="140" width="360" height="280" rx="8" fill="#111118" stroke="#00D4FF" stroke-width="1.5"/>
  <!-- Terminal header -->
  <rect x="750" y="140" width="360" height="36" rx="8" fill="#0D0D14"/>
  <rect x="750" y="164" width="360" height="12" fill="#0D0D14"/>
  <circle cx="778" cy="158" r="6" fill="#FF5F56"/>
  <circle cx="800" cy="158" r="6" fill="#FFBD2E"/>
  <circle cx="822" cy="158" r="6" fill="#27C93F"/>
  <text x="848" y="163" font-family="monospace" font-size="11" fill="#6B7280">bash — phys-agent</text>
  <!-- Terminal content -->
  <text x="772" y="208" font-family="monospace" font-size="13" fill="#6B7280">$</text>
  <text x="786" y="208" font-family="monospace" font-size="13" fill="#00FF88">phys-agent status</text>
  <text x="772" y="234" font-family="monospace" font-size="13" fill="#00FF88">[OK] ESP32 Node</text>
  <text x="1010" y="234" font-family="monospace" font-size="13" fill="#F0F0FF" text-anchor="end">ONLINE</text>
  <text x="772" y="258" font-family="monospace" font-size="13" fill="#00FF88">[OK] RPi5 Core</text>
  <text x="1010" y="258" font-family="monospace" font-size="13" fill="#F0F0FF" text-anchor="end">RUNNING</text>
  <text x="772" y="282" font-family="monospace" font-size="13" fill="#00FF88">[OK] MCP Server</text>
  <text x="1010" y="282" font-family="monospace" font-size="13" fill="#F0F0FF" text-anchor="end">ACTIVE</text>
  <text x="772" y="308" font-family="monospace" font-size="13" fill="#00D4FF">&gt; Temp: 31.4 C | eCO2: 412ppm</text>
  <text x="772" y="334" font-family="monospace" font-size="13" fill="#00D4FF">&gt; Bearing FFT: [Normal] OK</text>
  <text x="772" y="360" font-family="monospace" font-size="13" fill="#6B7280">$ _</text>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="#00D4FF" opacity="0.3"/>
</svg>
